server.port=8083
spring.application.name=bff-web

# Microservice URLs (Docker uses service name, local uses localhost)
services.cliente.url=http://localhost:8081
services.reparacion.url=http://localhost:8082
services.notificacion.url=http://localhost:8084
services.cotizacion.url=http://localhost:8085
services.garantia.url=http://localhost:8086
services.conversor.url=http://localhost:8087
services.diagnostico.url=http://localhost:8088
services.inventario.url=http://localhost:8089
services.factura.url=http://localhost:8090
services.encuesta.url=http://localhost:8091
services.auditoria.url=http://localhost:8092

# JWT (same secret as los microservicios)
jwt.secret=smartfix-secret-key-256-bits-minimo-para-hs256-aqui
jwt.expiration-ms=3600000

# GlitchTip (compatible con el SDK de Sentry). Si SENTRY_DSN viene vacio,
# el SDK queda deshabilitado automaticamente (no rompe el arranque local).
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:development}
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=info
sentry.traces-sample-rate=1.0
