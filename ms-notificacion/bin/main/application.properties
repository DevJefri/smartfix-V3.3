server.port=8084
spring.application.name=ms-notificacion

jwt.secret=smartfix-secret-key-256-bits-minimo-para-hs256-aqui
jwt.expiration-ms=3600000

# GlitchTip (compatible con el SDK de Sentry). Si SENTRY_DSN viene vacio,
# el SDK queda deshabilitado automaticamente (no rompe el arranque local).
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:development}
sentry.logging.minimum-event-level=error
sentry.logging.minimum-breadcrumb-level=info
sentry.traces-sample-rate=1.0
